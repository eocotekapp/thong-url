<script>
  const form = document.getElementById("uploadForm");
  const result = document.getElementById("result");

  function escapeHtml(text) {
    return String(text || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    result.innerHTML = `
      <div class="result">
        <div style="margin-bottom:12px;font-weight:700;">
          Đang upload video...
        </div>

        <div style="
          width:100%;
          height:20px;
          background:rgba(255,255,255,0.08);
          border-radius:999px;
          overflow:hidden;
        ">
          <div id="progressBar" style="
            width:0%;
            height:100%;
            background:linear-gradient(90deg,#6fffb0,#32d8ff);
            border-radius:999px;
            transition:width 0.2s ease;
          "></div>
        </div>

        <div id="progressText" style="
          margin-top:12px;
          color:#d5e3ff;
          font-size:15px;
          font-weight:600;
        ">
          0%
        </div>
      </div>
    `;

    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    try {
      const xhr = new XMLHttpRequest();

      xhr.open("POST", "/api/upload", true);

      xhr.upload.addEventListener("progress", (event) => {
        if (event.lengthComputable) {
          const percent = Math.round((event.loaded / event.total) * 100);

          progressBar.style.width = percent + "%";

          progressText.innerHTML = `
            ${percent}%<br>
            <span style="
              font-size:13px;
              color:#9db3d1;
              font-weight:400;
            ">
              ${(event.loaded / 1024 / 1024).toFixed(2)} MB / ${(event.total / 1024 / 1024).toFixed(2)} MB
            </span>
          `;
        }
      });

      xhr.onload = () => {
        try {
          const data = JSON.parse(xhr.responseText);

          if (!data.success) {
            result.innerHTML = `
              <div class="result error">
                Upload thất bại<br><br>
                ${escapeHtml(data.message || "Lỗi không xác định")}
              </div>
            `;
            return;
          }

          result.innerHTML = `
            <div class="result">
              <div class="line">
                <b>Tên file:</b><br>
                ${escapeHtml(data.fileName)}
              </div>

              <div class="line">
                <b>Public ID:</b><br>
                ${escapeHtml(data.publicId)}
              </div>

              <div class="line">
                <b>Định dạng:</b>
                ${escapeHtml(data.format)}
              </div>

              <div class="line">
                <b>Kích thước:</b>
                ${(data.bytes / 1024 / 1024).toFixed(2)} MB
              </div>

              <div class="line">
                <b>Hết hạn sau:</b>
                ${escapeHtml(data.expiresInMinutes)} phút
              </div>

              <div class="line">
                <b>Direct URL:</b><br><br>

                <a href="${escapeHtml(data.directUrl)}" target="_blank">
                  ${escapeHtml(data.directUrl)}
                </a>

                <button
                  type="button"
                  onclick="navigator.clipboard.writeText('${escapeHtml(data.directUrl)}'); this.innerText='Đã copy';"
                  style="
                    margin-top:12px;
                    width:100%;
                    background:#2f7df6;
                    color:#fff;
                    border:none;
                    border-radius:12px;
                    padding:12px;
                    font-weight:700;
                    cursor:pointer;
                  "
                >
                  Copy Direct URL
                </button>
              </div>

              <div class="line">
                <b>Preview URL:</b><br><br>

                <a href="${escapeHtml(data.previewUrl)}" target="_blank">
                  ${escapeHtml(data.previewUrl)}
                </a>

                <button
                  type="button"
                  onclick="navigator.clipboard.writeText('${escapeHtml(data.previewUrl)}'); this.innerText='Đã copy';"
                  style="
                    margin-top:12px;
                    width:100%;
                    background:#1d9b5f;
                    color:#fff;
                    border:none;
                    border-radius:12px;
                    padding:12px;
                    font-weight:700;
                    cursor:pointer;
                  "
                >
                  Copy Preview URL
                </button>
              </div>

              <video
                controls
                playsinline
                style="
                  width:100%;
                  border-radius:16px;
                  margin-top:20px;
                  background:#000;
                "
                src="${escapeHtml(data.previewUrl)}"
              ></video>
            </div>
          `;
        } catch (err) {
          result.innerHTML = `
            <div class="result error">
              Không đọc được phản hồi từ server
            </div>
          `;
        }
      };

      xhr.onerror = () => {
        result.innerHTML = `
          <div class="result error">
            Upload thất bại do lỗi mạng hoặc server
          </div>
        `;
      };

      xhr.send(formData);
    } catch (error) {
      result.innerHTML = `
        <div class="result error">
          Upload thất bại<br><br>
          ${escapeHtml(error.message)}
        </div>
      `;
    }
  });
</script>
