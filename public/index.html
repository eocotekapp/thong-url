<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudinary Video Upload</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #071425 0%, #0d1d35 100%);
      color: #ffffff;
      padding: 24px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 30px;
    }

    p {
      color: #b8c7e0;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-size: 14px;
      color: #d5e3ff;
    }

    input[type="file"],
    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #041018;
      background: #6fffb0;
    }

    .result {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      word-break: break-word;
    }

    .line {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
    }

    a {
      color: #7ec8ff;
      text-decoration: none;
      word-break: break-all;
    }

    video {
      width: 100%;
      border-radius: 16px;
      margin-top: 16px;
      background: #000;
    }

    .error {
      color: #ffb5b5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Upload video lấy direct URL</h1>
      <p>
        Upload video lên Cloudinary và lấy link direct có giới hạn thời gian 15 phút hoặc 30 phút.
      </p>

      <form id="uploadForm">
        <label>Chọn video</label>
        <input type="file" name="video" accept="video/*" required>

        <label>Thời hạn link</label>
        <select name="expireMinutes">
          <option value="15">15 phút</option>
          <option value="30" selected>30 phút</option>
        </select>

        <button type="submit">Upload video</button>
      </form>

      <div id="result"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("uploadForm");
    const result = document.getElementById("result");

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      result.innerHTML = `
        <div class="result">
          Đang upload...
        </div>
      `;

      const formData = new FormData(form);

      try {
        const response = await fetch("/api/upload", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!data.success) {
          result.innerHTML = `
            <div class="result error">
              Upload thất bại<br><br>
              ${escapeHtml(data.message || "Lỗi không xác định")}
            </div>
          `;
          return;
        }

        result.innerHTML = `
          <div class="result">
            <div class="line"><b>Tên file:</b> ${escapeHtml(data.fileName)}</div>
            <div class="line"><b>Public ID:</b> ${escapeHtml(data.publicId)}</div>
            <div class="line"><b>Định dạng:</b> ${escapeHtml(data.format)}</div>
            <div class="line"><b>Kích thước:</b> ${escapeHtml(data.bytes)} bytes</div>
            <div class="line"><b>Hết hạn sau:</b> ${escapeHtml(data.expiresInMinutes)} phút</div>
            <div class="line">
              <b>Direct URL:</b><br>
              <a href="${escapeHtml(data.directUrl)}" target="_blank">${escapeHtml(data.directUrl)}</a>
            </div>
            <div class="line">
              <b>Preview URL:</b><br>
              <a href="${escapeHtml(data.previewUrl)}" target="_blank">${escapeHtml(data.previewUrl)}</a>
            </div>
            <video controls src="${escapeHtml(data.previewUrl)}"></video>
          </div>
        `;
      } catch (error) {
        result.innerHTML = `
          <div class="result error">
            Upload thất bại<br><br>
            ${escapeHtml(error.message)}
          </div>
        `;
      }
    });
  </script>
</body>
</html>
